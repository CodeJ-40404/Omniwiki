<!-- templates/recent_discussions.html - 全局最新讨论页面（参照edit.html风格） -->
{% extends "base.html" %}

{% block title %}最新讨论 - 寰宇维基{% endblock %}

{% block extra_head %}
<style>
    .global-discussions-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
    }

    /* 头部区域 */
    .global-header {
        margin-bottom: 32px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border-light);
    }

        .global-header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, var(--accent-gold));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .global-header .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

    /* 统计卡片 */
    .stats-cards {
        display: flex;
        gap: 20px;
        margin-bottom: 32px;
        flex-wrap: wrap;
    }

    .stat-card {
        background: var(--surface-card);
        border-radius: 20px;
        padding: 16px 24px;
        flex: 1;
        min-width: 150px;
        border: 1px solid var(--border-light);
        transition: all 0.2s;
    }

        .stat-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-2px);
        }

        .stat-card .stat-icon {
            font-size: 1.8rem;
            color: var(--accent-gold);
            margin-bottom: 8px;
        }

        .stat-card .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--text-primary);
        }

        .stat-card .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

    /* 标签页导航 */
    .discussions-nav {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
        border-bottom: 1px solid var(--border-light);
        padding-bottom: 12px;
        flex-wrap: wrap;
    }

    .nav-tab {
        background: transparent;
        border: none;
        padding: 10px 24px;
        border-radius: 40px;
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.9rem;
        font-weight: 500;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

        .nav-tab:hover {
            background: var(--surface-hover);
            color: var(--accent-gold);
        }

        .nav-tab.active {
            background: var(--accent-gold);
            color: #0f0f12;
        }

    /* 话题卡片 - 参照edit.html的卡片风格 */
    .topics-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .topic-card {
        background: var(--surface-card);
        border-radius: 20px;
        padding: 20px;
        border: 1px solid var(--border-light);
        transition: all 0.2s;
        cursor: pointer;
    }

        .topic-card:hover {
            border-color: var(--accent-gold);
            transform: translateX(4px);
        }

        .topic-card.pinned {
            border-left: 4px solid var(--accent-gold);
            background: rgba(255, 194, 68, 0.05);
        }

    .topic-card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 12px;
    }

    .topic-title {
        font-size: 1.1rem;
        font-weight: 600;
    }

        .topic-title a {
            color: var(--text-primary);
            text-decoration: none;
        }

            .topic-title a:hover {
                color: var(--accent-gold);
            }

    .topic-badges {
        display: flex;
        gap: 6px;
    }

    .badge {
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 0.65rem;
        font-weight: 600;
    }

    .badge-pinned {
        background: var(--accent-gold);
        color: #0f0f12;
    }

    .badge-closed {
        background: rgba(255, 85, 85, 0.2);
        color: #ff6b6b;
    }

    .badge-hot {
        background: rgba(255, 68, 68, 0.2);
        color: #ff6b6b;
    }

    .topic-meta {
        display: flex;
        gap: 20px;
        font-size: 0.7rem;
        color: var(--text-muted);
        margin-bottom: 12px;
        flex-wrap: wrap;
    }

        .topic-meta a {
            color: var(--accent-gold);
            text-decoration: none;
        }

            .topic-meta a:hover {
                text-decoration: underline;
            }

    .topic-preview {
        color: var(--text-secondary);
        font-size: 0.85rem;
        margin-bottom: 12px;
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .topic-stats {
        display: flex;
        gap: 16px;
        font-size: 0.7rem;
        color: var(--text-muted);
    }

        .topic-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

    /* 空状态 */
    .empty-state {
        text-align: center;
        padding: 60px;
        background: var(--surface-card);
        border-radius: 24px;
        border: 1px solid var(--border-light);
    }

        .empty-state i {
            font-size: 3rem;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .empty-state p {
            color: var(--text-muted);
            margin-bottom: 16px;
        }

    /* 加载动画 */
    .loading-spinner {
        text-align: center;
        padding: 60px;
        color: var(--text-muted);
    }

        .loading-spinner i {
            font-size: 2rem;
            margin-bottom: 12px;
        }

    /* 分页 */
    .pagination {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 32px;
        padding: 20px 0;
    }

    .page-btn {
        background: var(--surface-card);
        border: 1px solid var(--border-light);
        padding: 8px 14px;
        border-radius: 12px;
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.2s;
    }

        .page-btn:hover, .page-btn.active {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

    /* 响应式 */
    @media (max-width: 768px) {
        .stats-cards {
            flex-direction: column;
        }

        .topic-card-header {
            flex-direction: column;
        }

        .topic-meta {
            gap: 12px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="global-discussions-container">
    <!-- 头部 -->
    <div class="global-header">
        <h1><i class="fas fa-comments"></i> 社区讨论</h1>
        <p class="subtitle">参与全站话题讨论，分享你的知识和见解</p>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-cards" id="statsCards">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
            <div class="stat-number" id="totalTopics">--</div>
            <div class="stat-label">总话题</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-reply-all"></i></div>
            <div class="stat-number" id="totalReplies">--</div>
            <div class="stat-label">总回复</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-users"></i></div>
            <div class="stat-number" id="totalParticipants">--</div>
            <div class="stat-label">参与人数</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-fire"></i></div>
            <div class="stat-number" id="todayActive">--</div>
            <div class="stat-label">今日活跃</div>
        </div>
    </div>

    <!-- 导航标签 -->
    <div class="discussions-nav">
        <a href="/recent-discussions" class="nav-tab active">
            <i class="fas fa-clock"></i> 最新
        </a>
        <a href="/hot-discussions" class="nav-tab">
            <i class="fas fa-fire"></i> 最热
        </a>
        {% if username %}
        <a href="/my-discussions" class="nav-tab">
            <i class="fas fa-user"></i> 我的讨论
        </a>
        {% endif %}
    </div>

    <!-- 话题列表 -->
    <div id="topicsList" class="topics-list">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-pulse"></i>
            <p>加载讨论中...</p>
        </div>
    </div>

    <!-- 分页 -->
    <div id="pagination" class="pagination"></div>
</div>

<script>
    let allTopics = [];
    let currentPage = 1;
    const itemsPerPage = 20;

    // 加载统计数据
    async function loadStats() {
        try {
            const response = await fetch('/api/discussions-stats');
            const stats = await response.json();
            document.getElementById('totalTopics').textContent = stats.total_topics || 0;
            document.getElementById('totalReplies').textContent = stats.total_replies || 0;
            document.getElementById('totalParticipants').textContent = stats.total_participants || 0;
            document.getElementById('todayActive').textContent = stats.today_active || 0;
        } catch (error) {
            console.error('加载统计失败:', error);
        }
    }

    // 加载话题列表
    async function loadTopics() {
        const topicsList = document.getElementById('topicsList');
        topicsList.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i><p>加载讨论中...</p></div>';

        try {
            const response = await fetch('/api/all-discussions');
            allTopics = await response.json();
            renderTopics();
            renderPagination();
        } catch (error) {
            topicsList.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>加载失败，请刷新重试</p></div>';
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatTimeAgo(dateStr) {
        const date = new Date(dateStr);
        const now = new Date();
        const diff = Math.floor((now - date) / 1000);

        if (diff < 60) return `${diff}秒前`;
        if (diff < 3600) return `${Math.floor(diff / 60)}分钟前`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}小时前`;
        if (diff < 604800) return `${Math.floor(diff / 86400)}天前`;
        return dateStr.substring(5);
    }

    function renderTopics() {
        const topicsList = document.getElementById('topicsList');
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageTopics = allTopics.slice(start, end);

        if (pageTopics.length === 0) {
            topicsList.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-comment-slash"></i>
                    <p>暂无讨论话题</p>
                    <p class="subtitle">成为第一个发起讨论的人吧！</p>
                    {% if username %}
                    <a href="/create-discussion" class="btn-primary" style="display: inline-block; margin-top: 16px;">
                        <i class="fas fa-plus-circle"></i> 发起讨论
                    </a>
                    {% endif %}
                </div>
            `;
            return;
        }

        topicsList.innerHTML = pageTopics.map(topic => `
            <div class="topic-card ${topic.is_pinned ? 'pinned' : ''}">
                <div class="topic-card-header">
                    <div class="topic-title">
                        <a href="/discussions/${encodeURIComponent(topic.page_name)}#topic-${topic.id}">
                            ${escapeHtml(topic.title)}
                        </a>
                    </div>
                    <div class="topic-badges">
                        ${topic.is_pinned ? '<span class="badge badge-pinned"><i class="fas fa-thumbtack"></i> 置顶</span>' : ''}
                        ${topic.is_closed ? '<span class="badge badge-closed"><i class="fas fa-lock"></i> 已关闭</span>' : ''}
                        ${topic.reply_count >= 10 ? '<span class="badge badge-hot"><i class="fas fa-fire"></i> 热门</span>' : ''}
                    </div>
                </div>
                <div class="topic-meta">
                    <span><i class="fas fa-file-alt"></i> 来自 <a href="/page/${encodeURIComponent(topic.page_name)}">${escapeHtml(topic.page_title)}</a></span>
                    <span><i class="fas fa-user"></i> ${escapeHtml(topic.author)}</span>
                    <span><i class="fas fa-clock"></i> ${formatTimeAgo(topic.created_at)}</span>
                </div>
                <div class="topic-preview">
                    ${escapeHtml(topic.content.substring(0, 200))}${topic.content.length > 200 ? '...' : ''}
                </div>
                <div class="topic-stats">
                    <span><i class="fas fa-thumbs-up"></i> ${topic.likes || 0}</span>
                    <span><i class="fas fa-comment"></i> ${topic.reply_count || 0} 回复</span>
                    <span><i class="fas fa-eye"></i> ${topic.views || 0}</span>
                </div>
            </div>
        `).join('');

        // 添加点击跳转
        document.querySelectorAll('.topic-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (!e.target.closest('a')) {
                    const link = card.querySelector('.topic-title a');
                    if (link) window.location.href = link.href;
                }
            });
        });
    }

    function renderPagination() {
        const totalPages = Math.ceil(allTopics.length / itemsPerPage);
        if (totalPages <= 1) return;

        const pagination = document.getElementById('pagination');
        let html = '';

        // 上一页
        if (currentPage > 1) {
            html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})"><i class="fas fa-chevron-left"></i></button>`;
        }

        // 页码
        const startPage = Math.max(1, currentPage - 2);
        const endPage = Math.min(totalPages, currentPage + 2);

        if (startPage > 1) {
            html += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
            if (startPage > 2) html += `<span class="page-btn" style="cursor: default;">...</span>`;
        }

        for (let i = startPage; i <= endPage; i++) {
            html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
        }

        if (endPage < totalPages) {
            if (endPage < totalPages - 1) html += `<span class="page-btn" style="cursor: default;">...</span>`;
            html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
        }

        // 下一页
        if (currentPage < totalPages) {
            html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})"><i class="fas fa-chevron-right"></i></button>`;
        }

        pagination.innerHTML = html;
    }

    function goToPage(page) {
        currentPage = page;
        renderTopics();
        renderPagination();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 初始化
    loadStats();
    loadTopics();
</script>
{% endblock %}
