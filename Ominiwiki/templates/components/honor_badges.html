<!-- templates/components/honor_badges.html - 名牌组件 -->
<style>
    /* 名牌样式 - 放在用户名旁边 */
    .honor-badges-inline {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-left: 10px;
        vertical-align: middle;
    }

    .honor-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 10px;
        border-radius: 30px;
        font-size: 0.7rem;
        font-weight: 500;
        backdrop-filter: blur(4px);
        transition: all 0.2s;
        cursor: default;
        white-space: nowrap;
    }

        .honor-badge:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .honor-badge i {
            font-size: 0.65rem;
        }

    /* 用户详情模态窗 */
    .user-detail-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(8px);
        justify-content: center;
        align-items: center;
        z-index: 2000;
    }

    .user-detail-card {
        background: var(--surface-card);
        border-radius: 32px;
        max-width: 500px;
        width: 90%;
        border: 1px solid var(--border-light);
        overflow: hidden;
        animation: modalFadeIn 0.3s ease;
    }

    .user-detail-header {
        padding: 24px;
        background: linear-gradient(135deg, #1a1c2a, #0f111a);
        display: flex;
        gap: 20px;
        align-items: center;
    }

    .user-detail-avatar {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, var(--accent-gold), #ffa500);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        font-weight: bold;
    }

    .user-detail-info h3 {
        font-size: 1.5rem;
        margin-bottom: 4px;
    }

    .user-detail-role {
        color: var(--accent-gold);
        font-size: 0.8rem;
    }

    .user-detail-body {
        padding: 24px;
    }

    .user-detail-section {
        margin-bottom: 24px;
    }

        .user-detail-section h4 {
            font-size: 0.9rem;
            margin-bottom: 12px;
            color: var(--accent-gold);
            border-left: 3px solid var(--accent-gold);
            padding-left: 12px;
        }

    .user-detail-stats {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
    }

    .user-stat-item {
        background: var(--bg-dark);
        border-radius: 16px;
        padding: 12px;
        text-align: center;
    }

    .user-stat-number {
        font-size: 1.5rem;
        font-weight: bold;
        color: var(--accent-gold);
    }

    .user-stat-label {
        font-size: 0.7rem;
        color: var(--text-muted);
    }

    .close-modal-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        background: transparent;
        border: none;
        color: var(--text-muted);
        font-size: 1.5rem;
        cursor: pointer;
    }

    @keyframes modalFadeIn {
        from {
            opacity: 0;
            transform: scale(0.95);
        }

        to {
            opacity: 1;
            transform: scale(1);
        }
    }
</style>

<!-- 名牌显示容器 -->
<div id="userHonorBadges" class="honor-badges-inline" style="display: none;"></div>

<!-- 用户详情模态窗 -->
<div id="userDetailModal" class="user-detail-modal">
    <div class="user-detail-card">
        <div class="user-detail-header">
            <div class="user-detail-avatar" id="modalAvatar">👤</div>
            <div class="user-detail-info">
                <h3 id="modalUsername">用户名</h3>
                <div class="user-detail-role" id="modalRole"></div>
                <div class="honor-badges-inline" id="modalHonors"></div>
            </div>
        </div>
        <div class="user-detail-body">
            <div class="user-detail-section">
                <h4><i class="fas fa-chart-line"></i> 贡献统计</h4>
                <div class="user-detail-stats" id="modalStats"></div>
            </div>
            <div class="user-detail-section">
                <h4><i class="fas fa-calendar-alt"></i> 个人信息</h4>
                <div id="modalInfo"></div>
            </div>
        </div>
        <button class="close-modal-btn" onclick="closeUserModal()">&times;</button>
    </div>
</div>

<script>
    // 加载用户荣誉
    async function loadUserHonors(username) {
        try {
            const response = await fetch(`/api/user-honors/${encodeURIComponent(username)}`);
            const honors = await response.json();
            const container = document.getElementById('userHonorBadges');
            if (container && honors.length > 0) {
                container.style.display = 'inline-flex';
                container.innerHTML = honors.map(h => `
                    <div class="honor-badge" style="background: ${h.bg}; color: ${h.color};" title="${h.name}">
                        <i class="fas ${h.icon}"></i>
                        <span>${h.name}</span>
                    </div>
                `).join('');
            } else if (container) {
                container.style.display = 'none';
            }
            return honors;
        } catch (error) {
            console.error('加载荣誉失败:', error);
            return [];
        }
    }

    // 加载用户排名
    async function loadUserRank() {
        try {
            const response = await fetch('/api/user-rank');
            const data = await response.json();

            // 获取当前用户的排名徽章
            if (data.user_rank && data.user_rank <= 3) {
                const rankNames = {1: '热度冠军', 2: '热度亚军', 3: '热度季军'};
                const rankColors = {1: '#ffd700', 2: '#c0c0c0', 3: '#cd7f32'};
                const container = document.getElementById('userHonorBadges');
                if (container) {
                    const rankBadge = document.createElement('div');
                    rankBadge.className = 'honor-badge';
                    rankBadge.style.background = `rgba(${parseInt(rankColors[data.user_rank].slice(1,3), 16)}, ${parseInt(rankColors[data.user_rank].slice(3,5), 16)}, ${parseInt(rankColors[data.user_rank].slice(5,7), 16)}, 0.15)`;
                    rankBadge.style.color = rankColors[data.user_rank];
                    rankBadge.innerHTML = `<i class="fas fa-trophy"></i> <span>${rankNames[data.user_rank]}</span>`;
                    container.appendChild(rankBadge);
                }
            }
            return data;
        } catch (error) {
            console.error('加载排名失败:', error);
        }
    }

    // 显示用户详情模态窗
    async function showUserDetail(username) {
        try {
            const response = await fetch(`/api/user-honors/${encodeURIComponent(username)}`);
            const honors = await response.json();
            const rankResponse = await fetch('/api/user-rank');
            const rankData = await rankResponse.json();

            const rankInfo = rankData.rankings.find(r => r.username === username);
            const rank = rankData.rankings.findIndex(r => r.username === username) + 1;

            document.getElementById('modalUsername').textContent = username;
            document.getElementById('modalAvatar').textContent = username[0].toUpperCase();
            document.getElementById('modalRole').innerHTML = honors.some(h => h.name === '管理员') ? '<i class="fas fa-crown"></i> 网站管理员' : '注册用户';

            // 显示荣誉
            const modalHonors = document.getElementById('modalHonors');
            if (honors.length > 0) {
                modalHonors.innerHTML = honors.map(h => `
                    <div class="honor-badge" style="background: ${h.bg}; color: ${h.color};">
                        <i class="fas ${h.icon}"></i>
                        <span>${h.name}</span>
                    </div>
                `).join('');
            } else {
                modalHonors.innerHTML = '<span style="color: var(--text-muted); font-size: 0.7rem;">暂无荣誉</span>';
            }

            // 显示统计
            const modalStats = document.getElementById('modalStats');
            if (rankInfo) {
                modalStats.innerHTML = `
                    <div class="user-stat-item">
                        <div class="user-stat-number">${rankInfo.pages}</div>
                        <div class="user-stat-label">创建的页面</div>
                    </div>
                    <div class="user-stat-item">
                        <div class="user-stat-number">${rankInfo.topics}</div>
                        <div class="user-stat-label">发起的话题</div>
                    </div>
                    <div class="user-stat-item">
                        <div class="user-stat-number">${rankInfo.replies}</div>
                        <div class="user-stat-label">回复的数量</div>
                    </div>
                    <div class="user-stat-item">
                        <div class="user-stat-number">${rankInfo.likes}</div>
                        <div class="user-stat-label">获得点赞</div>
                    </div>
                `;
            } else {
                modalStats.innerHTML = '<div style="grid-column: span 2; text-align: center; color: var(--text-muted);">暂无统计数据</div>';
            }

            // 显示排名
            const modalInfo = document.getElementById('modalInfo');
            if (rank && rank <= 10) {
                modalInfo.innerHTML = `
                    <div class="user-stat-item" style="grid-column: span 2; background: rgba(255, 194, 68, 0.1);">
                        <div class="user-stat-number">#${rank}</div>
                        <div class="user-stat-label">全站贡献排名</div>
                    </div>
                `;
            } else {
                modalInfo.innerHTML = '<div style="color: var(--text-muted);">暂无更多信息</div>';
            }

            document.getElementById('userDetailModal').style.display = 'flex';
        } catch (error) {
            console.error('加载用户详情失败:', error);
        }
    }

    function closeUserModal() {
        document.getElementById('userDetailModal').style.display = 'none';
    }

    // 初始化名牌
    function initHonorBadges() {
        // 获取用户名（支持多种选择器）
        let usernameSpan = document.getElementById('username');
        if (!usernameSpan) {
            usernameSpan = document.querySelector('.username-span, #username');
        }

        // 获取头像/用户区域（用于绑定点击）
        const avatarIcon = document.querySelector('.avatar, .avatar-icon, .user-badge .avatar');

        const currentUser = usernameSpan ? usernameSpan.textContent.trim() : null;

        if (usernameSpan && currentUser && currentUser !== '访客') {
            // 设置可点击
            usernameSpan.style.cursor = 'pointer';
            usernameSpan.title = '点击查看个人荣誉';
            usernameSpan.onclick = (e) => {
                e.stopPropagation();
                showUserDetail(currentUser);
            };

            if (avatarIcon) {
                avatarIcon.style.cursor = 'pointer';
                avatarIcon.onclick = (e) => {
                    e.stopPropagation();
                    showUserDetail(currentUser);
                };
            }

            // 加载荣誉
            loadUserHonors(currentUser);
            loadUserRank();
        }
    }

    // 页面加载完成后初始化
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initHonorBadges);
    } else {
        initHonorBadges();
    }
</script>
