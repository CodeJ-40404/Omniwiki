<!-- templates/tags.html - 标签云页面 -->
{% extends "base.html" %}

{% block title %}标签云{% endblock %}

{% block content %}
<h1><i class="fas fa-tags"></i> 标签云</h1>
<p class="subtitle">点击标签查看相关页面</p>

<div class="tag-cloud">
    {% for tag, count in tags %}
    <a href="/tag/{{ tag }}" class="tag-cloud-item" style="font-size: {{ 14 + count * 2 }}px; opacity: {{ 0.6 + count * 0.1 }}">
        <span class="tag-name">{{ tag }}</span>
        <span class="tag-count">({{ count }})</span>
    </a>
    {% else %}
    <p>暂无标签</p>
    {% endfor %}
</div>

<style>
    .tag-cloud {
        background: var(--surface-card);
        border-radius: 32px;
        padding: 40px;
        text-align: center;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 16px;
    }

    .tag-cloud-item {
        text-decoration: none;
        color: var(--accent-gold);
        transition: all 0.2s;
        display: inline-block;
        padding: 4px 8px;
    }

        .tag-cloud-item:hover {
            transform: scale(1.05);
            color: var(--accent-blue);
        }

    .tag-count {
        font-size: 0.7em;
        opacity: 0.7;
    }

    .subtitle {
        color: var(--text-muted);
        margin-bottom: 24px;
    }
</style>
{% endblock %}
