<!-- templates/hot_discussions.html - 热门讨论页面（完全重写，更加精致） -->
{% extends "base.html" %}

{% block title %}热门讨论 - 寰宇维基{% endblock %}

{% block extra_head %}
<style>
    .hot-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
    }

    /* 英雄横幅 */
    .hero-banner {
        background: linear-gradient(135deg, #1a1c2a, #0f111a);
        border-radius: 32px;
        padding: 40px;
        margin-bottom: 32px;
        position: relative;
        overflow: hidden;
        border: 1px solid var(--border-light);
    }

        .hero-banner::before {
            content: '🔥';
            position: absolute;
            right: -20px;
            top: -20px;
            font-size: 150px;
            opacity: 0.1;
            pointer-events: none;
        }

        .hero-banner h1 {
            font-size: 2.5rem;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, var(--accent-gold));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .hero-banner .hero-desc {
            color: var(--text-muted);
            font-size: 1rem;
            max-width: 600px;
        }

    /* 统计卡片行 */
    .stats-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 32px;
    }

    .stat-card {
        background: var(--surface-card);
        border-radius: 20px;
        padding: 20px;
        border: 1px solid var(--border-light);
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
    }

        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-gold), transparent);
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .stat-card:hover::after {
            transform: scaleX(1);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-gold);
        }

    .stat-icon {
        font-size: 2rem;
        margin-bottom: 12px;
    }

    .stat-number {
        font-size: 2rem;
        font-weight: bold;
        color: var(--accent-gold);
    }

    .stat-label {
        color: var(--text-muted);
        font-size: 0.85rem;
        margin-top: 4px;
    }

    /* 时间筛选器 */
    .time-filter {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
        justify-content: flex-end;
    }

    .time-btn {
        background: var(--surface-card);
        border: 1px solid var(--border-light);
        padding: 6px 16px;
        border-radius: 40px;
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.8rem;
    }

        .time-btn:hover, .time-btn.active {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: #0f0f12;
        }

    /* 话题卡片增强 */
    .topic-card {
        background: var(--surface-card);
        border-radius: 20px;
        padding: 24px;
        margin-bottom: 16px;
        border: 1px solid var(--border-light);
        transition: all 0.3s;
        cursor: pointer;
        position: relative;
    }

        .topic-card:hover {
            transform: translateX(6px);
            border-color: var(--accent-gold);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

    .rank-number {
        position: absolute;
        left: -12px;
        top: 24px;
        width: 32px;
        height: 32px;
        background: var(--bg-dark);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 0.9rem;
        color: var(--text-muted);
        border: 1px solid var(--border-light);
        transition: all 0.3s;
    }

    .topic-card:hover .rank-number {
        border-color: var(--accent-gold);
        color: var(--accent-gold);
    }

    .rank-number.top1 {
        background: linear-gradient(135deg, #ffd700, #ffaa00);
        color: #0f0f12;
        border: none;
    }

    .rank-number.top2 {
        background: linear-gradient(135deg, #c0c0c0, #909090);
        color: #0f0f12;
        border: none;
    }

    .rank-number.top3 {
        background: linear-gradient(135deg, #cd7f32, #b87333);
        color: #0f0f12;
        border: none;
    }

    .topic-title {
        font-size: 1.2rem;
        font-weight: 600;
        margin-bottom: 12px;
        padding-left: 28px;
    }

        .topic-title a {
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.2s;
        }

            .topic-title a:hover {
                color: var(--accent-gold);
            }

    /* 热度条 */
    .heat-bar-container {
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid var(--border-light);
    }

    .heat-bar {
        height: 6px;
        background: var(--bg-dark);
        border-radius: 3px;
        overflow: hidden;
    }

    .heat-fill {
        height: 100%;
        background: linear-gradient(90deg, #ff6b6b, var(--accent-gold));
        border-radius: 3px;
        transition: width 0.5s ease;
    }

    .heat-label {
        display: flex;
        justify-content: space-between;
        margin-top: 6px;
        font-size: 0.7rem;
        color: var(--text-muted);
    }

    /* 勋章 */
    .medal {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 0.7rem;
        font-weight: 500;
    }

    .medal-gold {
        background: rgba(255, 215, 0, 0.15);
        color: #ffd700;
    }

    .medal-silver {
        background: rgba(192, 192, 192, 0.15);
        color: #c0c0c0;
    }

    .medal-bronze {
        background: rgba(205, 127, 50, 0.15);
        color: #cd7f32;
    }

    /* 刷新按钮 */
    .refresh-btn {
        position: fixed;
        bottom: 100px;
        right: 20px;
        width: 48px;
        height: 48px;
        background: var(--surface-card);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border: 1px solid var(--border-light);
        transition: all 0.3s;
        z-index: 100;
    }

        .refresh-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            transform: rotate(180deg);
        }

    @keyframes pulse {
        0%, 100% {
            opacity: 1;
        }

        50% {
            opacity: 0.5;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="hot-container">
    <!-- 英雄横幅 -->
    <div class="hero-banner">
        <h1><i class="fas fa-fire"></i> 热门讨论</h1>
        <p class="hero-desc">全站最受关注的话题，由点赞、回复和浏览量综合计算热度</p>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-row" id="statsRow">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
            <div class="stat-number" id="totalTopics">--</div>
            <div class="stat-label">总话题</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-reply-all"></i></div>
            <div class="stat-number" id="totalReplies">--</div>
            <div class="stat-label">总回复</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-users"></i></div>
            <div class="stat-number" id="totalParticipants">--</div>
            <div class="stat-label">参与人数</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
            <div class="stat-number" id="avgHeat">--</div>
            <div class="stat-label">平均热度</div>
        </div>
    </div>

    <!-- 时间筛选 -->
    <div class="time-filter">
        <button class="time-btn" data-days="7">本周热门</button>
        <button class="time-btn" data-days="30">本月热门</button>
        <button class="time-btn active" data-days="0">全部时间</button>
    </div>

    <!-- 话题列表 -->
    <div id="hotTopicsList"></div>

    <!-- 刷新按钮 -->
    <div class="refresh-btn" onclick="loadHotTopics()">
        <i class="fas fa-sync-alt"></i>
    </div>
</div>

<script>
    let allTopics = [];
    let currentDays = 0;

    async function loadStats() {
        try {
            const response = await fetch('/api/discussions-stats');
            const stats = await response.json();
            document.getElementById('totalTopics').textContent = stats.total_topics || 0;
            document.getElementById('totalReplies').textContent = stats.total_replies || 0;
            document.getElementById('totalParticipants').textContent = stats.total_participants || 0;
            if (allTopics.length > 0) {
                const avg = allTopics.reduce((sum, t) => sum + (t.hot_score || 0), 0) / allTopics.length;
                document.getElementById('avgHeat').textContent = Math.round(avg);
            }
        } catch (error) {
            console.error('加载统计失败:', error);
        }
    }

    async function loadHotTopics() {
        const container = document.getElementById('hotTopicsList');
        container.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i><p>加载热门讨论中...</p></div>';

        try {
            const response = await fetch('/api/hot-discussions-full');
            let topics = await response.json();
            allTopics = topics;

            // 时间筛选
            if (currentDays > 0) {
                const cutoffDate = new Date();
                cutoffDate.setDate(cutoffDate.getDate() - currentDays);
                topics = topics.filter(t => new Date(t.created_at) >= cutoffDate);
            }

            if (topics.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-chart-line"></i>
                        <p>暂无热门话题</p>
                        <p class="subtitle">成为第一个发起讨论的人吧！</p>
                        {% if username %}
                        <a href="/create-discussion" class="btn-primary" style="display: inline-block; margin-top: 16px;">
                            <i class="fas fa-plus-circle"></i> 发起讨论
                        </a>
                        {% endif %}
                    </div>
                `;
                return;
            }

            const maxHeat = topics[0]?.hot_score || 1;

            container.innerHTML = topics.map((topic, index) => {
                let rankClass = '';
                let medalHtml = '';
                if (index === 0) {
                    rankClass = 'top1';
                    medalHtml = '<span class="medal medal-gold"><i class="fas fa-crown"></i> 热度冠军</span>';
                } else if (index === 1) {
                    rankClass = 'top2';
                    medalHtml = '<span class="medal medal-silver"><i class="fas fa-medal"></i> 热度亚军</span>';
                } else if (index === 2) {
                    rankClass = 'top3';
                    medalHtml = '<span class="medal medal-bronze"><i class="fas fa-medal"></i> 热度季军</span>';
                }

                return `
                    <div class="topic-card" data-url="/discussions/${encodeURIComponent(topic.page_name)}#topic-${topic.id}">
                        <div class="rank-number ${rankClass}">${index + 1}</div>
                        <div class="topic-title">
                            <a href="/discussions/${encodeURIComponent(topic.page_name)}#topic-${topic.id}">
                                ${escapeHtml(topic.title)}
                            </a>
                            ${medalHtml}
                        </div>
                        <div class="topic-meta">
                            <span><i class="fas fa-file-alt"></i> 来自 <a href="/page/${encodeURIComponent(topic.page_name)}">${escapeHtml(topic.page_title)}</a></span>
                            <span><i class="fas fa-user"></i> ${escapeHtml(topic.author)}</span>
                            <span><i class="fas fa-clock"></i> ${formatTimeAgo(topic.created_at)}</span>
                        </div>
                        <div class="topic-preview">
                            ${escapeHtml(topic.content.substring(0, 200))}${topic.content.length > 200 ? '...' : ''}
                        </div>
                        <div class="topic-stats">
                            <span><i class="fas fa-thumbs-up"></i> ${topic.likes || 0}</span>
                            <span><i class="fas fa-comment"></i> ${topic.reply_count || 0} 回复</span>
                            <span><i class="fas fa-eye"></i> ${topic.views || 0}</span>
                            <span><i class="fas fa-chart-line"></i> 热度 ${Math.round(topic.hot_score)}</span>
                        </div>
                        <div class="heat-bar-container">
                            <div class="heat-bar">
                                <div class="heat-fill" style="width: ${(topic.hot_score / maxHeat) * 100}%"></div>
                            </div>
                            <div class="heat-label">
                                <span>🔥 热度值</span>
                                <span>${Math.round((topic.hot_score / maxHeat) * 100)}%</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.topic-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (!e.target.closest('a')) {
                        window.location.href = card.dataset.url;
                    }
                });
            });

            await loadStats();
        } catch (error) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>加载失败，请刷新重试</p></div>';
        }
    }

    // 时间筛选
    document.querySelectorAll('.time-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentDays = parseInt(btn.dataset.days);
            loadHotTopics();
        });
    });

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatTimeAgo(dateStr) {
        const date = new Date(dateStr);
        const now = new Date();
        const diff = Math.floor((now - date) / 1000);
        if (diff < 60) return `${diff}秒前`;
        if (diff < 3600) return `${Math.floor(diff / 60)}分钟前`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}小时前`;
        if (diff < 604800) return `${Math.floor(diff / 86400)}天前`;
        return dateStr.substring(5);
    }

    loadHotTopics();
</script>
{% endblock %}
