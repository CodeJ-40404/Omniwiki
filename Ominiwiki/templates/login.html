<!-- templates/login.html - 登录页面 -->
{% extends "base.html" %}

{% block title %}登录{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1><i class="fas fa-key"></i> 登录寰宇维基</h1>
        <p class="auth-subtitle">登录后即可创建和编辑词条</p>

        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label><i class="fas fa-user"></i> 用户名</label>
                <input type="text" name="username" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> 密码</label>
                <input type="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn-primary btn-block"><i class="fas fa-sign-in-alt"></i> 登录</button>
        </form>

        <p class="auth-footer">
            还没有账号？ <a href="/register">立即注册</a>
        </p>
        <div class="demo-accounts">
            <p>📢 演示账号：</p>
            <code>admin / admin123</code>
            <code>寰宇行者 / wiki2026</code>
            <code>蕉学家 / banana</code>
        </div>
    </div>
</div>
{% endblock %}
